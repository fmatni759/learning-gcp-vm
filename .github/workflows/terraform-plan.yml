name: "Terraform Plan"

on:
  pull_request:
    branches: [ main ]

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Auth GCP"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: "Terraform Init"
        working-directory: terraform
        run: terraform init
      - name: "Terraform Plan"
        id: plan
        working-directory: terraform
        run: terraform plan -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -no-color
        continue-on-error: true
      - name: "Commenter PR"
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## 📋 Terraform Plan\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\`\nStatut: ${{ steps.plan.outcome == 'success' && '✅ Succès' || '❌ Échec' }}`;
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: output });
      - if: steps.plan.outcome == 'failure'
        run: exit 1